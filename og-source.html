<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; }
  .card {
    position: relative; width: 1200px; height: 630px; overflow: hidden;
    background: linear-gradient(180deg, #EEF0FA 0%, #E4E7F6 45%, #EAEAF4 100%);
    font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
  }
  .blob { position:absolute; border-radius:50%; pointer-events:none; }
</style>
</head>
<body>
<div class="card">
  <!-- ambient blobs -->
  <div class="blob" style="top:-180px; left:-140px; width:560px; height:560px; background:radial-gradient(circle,#8EA0FB 0%, rgba(142,160,251,0) 68%); filter:blur(18px);"></div>
  <div class="blob" style="bottom:-220px; right:-120px; width:600px; height:600px; background:radial-gradient(circle,#B79BFB 0%, rgba(183,155,251,0) 68%); filter:blur(20px);"></div>
  <div class="blob" style="bottom:-260px; left:26%; width:520px; height:520px; background:radial-gradient(circle,#FF9E78 0%, rgba(255,158,120,0) 70%); filter:blur(22px); opacity:0.9;"></div>

  <!-- content -->
  <div style="position:relative; z-index:2; display:flex; height:100%; align-items:center; padding:0 72px; gap:56px;">
    <div style="flex:1;">
      <div style="display:flex; align-items:center; gap:14px;">
        <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(150deg,#7E93F7,#5066E8);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px -6px rgba(80,102,232,0.6), inset 0 1px 0 rgba(255,255,255,0.5);">
          <svg viewBox="0 0 100 100" width="38" height="38" fill="none"><path d="M14 56 C 22 31 49 30 47 47 C 45 62 28 58 33 46 C 38 35 56 40 87 51" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span style="font-family:'Inter Tight'; font-weight:700; font-size:28px; letter-spacing:-0.5px; color:#0E1220;">ChaosCtrl</span>
      </div>

      <div style="display:inline-flex; align-items:center; gap:9px; margin-top:34px; padding:9px 16px 9px 12px; border-radius:999px; background:rgba(255,255,255,0.55); border:1px solid rgba(255,255,255,0.75); box-shadow:inset 0 1px 0 rgba(255,255,255,0.9); font-size:15px; font-weight:600; color:#4E4A7A;">
        <span style="width:8px;height:8px;border-radius:50%;background:#FF7A4A;box-shadow:0 0 0 4px rgba(255,122,74,0.2);"></span>
        iOS second brain
      </div>

      <h1 style="font-family:'Inter Tight'; font-size:66px; line-height:1.02; letter-spacing:-2.4px; font-weight:800; margin:22px 0 0; color:#0E1220; max-width:620px;">The calm at the center of your chaos.</h1>
      <p style="font-size:23px; line-height:1.5; color:#454C63; margin:22px 0 0; max-width:560px;">Surfaces the one thing that needs you now — and drafts the reply for you.</p>
    </div>

    <!-- floating glass "up next" card -->
    <div style="width:360px; flex-shrink:0; border-radius:30px; padding:14px; background:linear-gradient(160deg, rgba(255,255,255,0.6), rgba(255,255,255,0.22)); border:1px solid rgba(255,255,255,0.7); box-shadow:0 40px 80px -24px rgba(50,55,110,0.45), inset 0 1px 0 rgba(255,255,255,0.9);">
      <div style="border-radius:22px; padding:22px; background:linear-gradient(155deg,#6B82F5,#4E63E8); box-shadow:0 16px 30px -12px rgba(78,99,232,0.7), inset 0 1px 0 rgba(255,255,255,0.35);">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="font-size:13px; font-weight:700; letter-spacing:0.5px; color:rgba(255,255,255,0.82);">UP NEXT</span>
          <span style="font-size:13px; font-weight:600; color:rgba(255,255,255,0.9); background:rgba(255,255,255,0.18); padding:4px 10px; border-radius:9px;">in 25 min</span>
        </div>
        <div style="font-size:21px; font-weight:700; color:#fff; margin-top:14px; line-height:1.3;">Reply to Dana before the 10:30 sync</div>
        <div style="font-size:15px; color:rgba(255,255,255,0.82); margin-top:8px;">She's waiting on the Q3 numbers</div>
        <div style="display:flex; gap:10px; margin-top:18px;">
          <div style="flex:1; text-align:center; padding:12px; border-radius:13px; background:rgba(255,255,255,0.92); color:#3D50D6; font-size:15px; font-weight:700;">Do it now</div>
          <div style="padding:12px 16px; border-radius:13px; background:rgba(255,255,255,0.16); color:#fff; font-size:15px; font-weight:600;">Snooze</div>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:11px; margin:14px 6px 6px; padding:13px 15px; border-radius:16px; background:rgba(255,255,255,0.7); border:1px solid rgba(255,255,255,0.85);">
        <div style="width:26px;height:26px;border-radius:9px;background:linear-gradient(150deg,#7E93F7,#5066E8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:700;line-height:1;">+</div>
        <span style="font-size:15px; color:#7A809A;">Capture anything…</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
